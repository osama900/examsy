<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الثالث - حلقات التكرار 🔁</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,

        {
          content: "حلقات التكرار المتداخلة في سكراتش",
          children: [
            {
              content: "مقدمة",
              children: [
                { content: "تنفيذ أوامر متكررة داخل أوامر أخرى" },
                { content: "تسهيل معالجة المهام المعقدة والمتعددة" },
              ],
            },
            {
              content: "مبدأ عمل الحلقات المتداخلة",
              children: [
                { content: "الحلقة الخارجية تبدأ أولاً" },
                { content: "الحلقة الداخلية تتكرر عدة مرات داخل الخارجية" },
                { content: "تستمر العملية حتى اكتمال الحلقة الخارجية" },
              ],
            },
            {
              content: "أنواع الحلقات",
              children: [
                { content: "الحلقة الخارجية" },
                { content: "الحلقة الداخلية" },
              ],
            },
            {
              content: "تطبيقات عملية في سكراتش",
              children: [
                { content: "إضافة جمهور يهتف في لعبة كرة القدم" },
                { content: "محاولات تسديد الأهداف باستخدام حلقات متداخلة" },
                { content: "تحريك الكائنات وتغيير المظهر في كل تكرار" },
              ],
            },
            {
              content: "تداخل الحلقات مع الشروط",
              children: [
                { content: "فحص شرط داخل كل تكرار" },
                { content: "تنفيذ إجراءات عند تحقق الشرط" },
                { content: "الاستمرار في التكرار إذا لم يتحقق الشرط" },
              ],
            },
            {
              content: "اختبار وتصحيح البرامج",
              children: [
                { content: "تطبيق سيناريوهات الفحص المختلفة" },
                { content: "اكتشاف الأخطاء وتصحيحها" },
                { content: "تبادل البرامج مع الزملاء لمراجعتها" },
              ],
            },
            {
              content: "البرمجة التعاونية والمشروعات الممزوجة",
              children: [
                { content: "البرمجة الثنائية Pair Programming لتحسين الجودة" },
                { content: "خاصية Remix في سكراتش لتطوير مشاريع الآخرين" },
                { content: "تعزيز التعاون والإبداع بين الطلاب" },
              ],
            },
          ],
        },

        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
