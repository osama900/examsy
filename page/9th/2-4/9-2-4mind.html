<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الرابع - الدوال البرمجية والروتين الفرعي 🕹️</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,

        {
          content: "الدوال والروتين الفرعي في سكراتش",
          children: [
            {
              content: "الدوال البرمجية (Functions)",
              children: [
                {
                  content: "تعريفها",
                  children: [
                    { content: "مجموعة أوامر تحت اسم محدد" },
                    { content: "يمكن استدعاؤها في أي جزء من البرنامج" },
                    { content: "تساعد على إعادة الاستخدام وتسهيل البرمجة" },
                  ],
                },
                {
                  content: "خصائص الدوال",
                  children: [
                    { content: "إعادة الاستخدام" },
                    { content: "تقبل المدخلات (Parameters)" },
                    { content: "إرجاع النتائج (Outputs)" },
                  ],
                },
                {
                  content: "أنواع الدوال",
                  children: [
                    { content: "الدوال الجاهزة (Built-in Functions)" },
                    {
                      content:
                        "دوال المستخدم / الروتين الفرعي (User-Defined / Subroutine)",
                    },
                  ],
                },
              ],
            },
            {
              content: "الروتين الفرعي (Subroutine)",
              children: [
                {
                  content: "مكوناته",
                  children: [
                    { content: "لبنة التعريف (Definition Block)" },
                    { content: "لبنة الاسم (Name Block)" },
                  ],
                },
                {
                  content: "الحقول في الروتين الفرعي",
                  children: [
                    { content: "رقمي (Number Input)" },
                    { content: "نصي (String Input)" },
                    { content: "منطقي (Boolean Input)" },
                  ],
                },
                {
                  content: "استخدامه",
                  children: [
                    { content: "تنفيذ أوامر مكررة بمدخلات مختلفة" },
                    { content: "تحريك الشخصيات وإصدار رسائل وأصوات" },
                    { content: "تعديل سلوك اللعبة حسب السيناريو" },
                  ],
                },
              ],
            },
            {
              content: "الإضافات (Extensions)",
              children: [
                { content: "توفير وظائف متقدمة للمشروعات" },
                {
                  content: "دمجها مع الدوال والروتينات الفرعية لإجراءات مركبة",
                },
                { content: "مثال: الترجمة داخل اللعبة بلغتين" },
              ],
            },
            {
              content: "تطوير المشروع التعليمي",
              children: [
                {
                  content: "مرحلة التصميم",
                  children: [
                    { content: "تعديل الشخصيات والخلفيات والأحداث" },
                    { content: "تعديل الشروط للانتقال بين المراحل" },
                  ],
                },
                {
                  content: "مرحلة التنفيذ",
                  children: [
                    { content: "إضافة الدوال والروتينات الفرعية" },
                    { content: "تعديل اللَبِنات لتحسين الأداء" },
                    { content: "مراجعة الأكواد للتأكد من خلوها من الأخطاء" },
                  ],
                },
                {
                  content: "مرحلة الاختبار",
                  children: [
                    { content: "تطبيق سيناريوهات الفحص وتصحيح الأخطاء" },
                    { content: "عرض المشروع على الزملاء والمعلّم" },
                  ],
                },
                {
                  content: "مرحلة النشر",
                  children: [
                    { content: "نشر اللعبة على Scratch" },
                    { content: "توثيق المصادر والمراجع" },
                  ],
                },
              ],
            },
          ],
        },

        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
