<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس السادس - أداء الشبكة ⏲</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,
        {
          content: "الدرس السادس - أداء الشبكة  ⏲",
          children: [
            {
              content: "مفهوم أداء الشبكة",
              children: [
                { content: "هو مستوى جودة الشبكة وفاعليتها." },
                {
                  content:
                    "يشمل سرعة الاتصال، وجودة التوصيل، والموثوقية، وكفاءة الشبكة.",
                },
              ],
            },
            {
              content: "مؤشرات أداء الشبكة",
              children: [
                { content: "عرض النطاق الترددي (Bandwidth)" },
                { content: "تأخر وصول البيانات (Delay)" },
                { content: "حجم البيانات المتبادلة (Load)" },
              ],
            },
            {
              content: "تأخر وصول البيانات Delay",
              children: [
                {
                  content: "هو الوقت الذي تستغرقه البيانات للوصول بين الأجهزة.",
                },
                { content: "يزداد التأخر عند طول المسافة." },
                {
                  content:
                    "تختلف سرعات نقل البيانات حسب الوسائط (سلكية/لاسلكية).",
                },
                { content: "يؤثر على الاجتماعات الافتراضية والبث المباشر." },
              ],
            },
            {
              content: "عرض النطاق الترددي Bandwidth",
              children: [
                { content: "أقصى كمية بيانات يمكن نقلها خلال وقت محدد." },
                { content: "انخفاض النطاق يؤدي لبطء الشبكة." },
                {
                  content:
                    "يزداد الضغط عند كثرة الأجهزة أو مشاهدة الفيديو أو تحميل الملفات.",
                },
                { content: "اختبار قياس السرعة يساعد في تقييم الشبكة." },
              ],
            },
            {
              content: "حجم البيانات المتبادلة Load",
              children: [
                {
                  content:
                    "قدرة الجهاز على معالجة المهام وطلبات المستخدمين وتشغيل التطبيقات.",
                },
                { content: "الحمل الزائد يسبب بطء وتأخر الشبكة." },
                { content: "الحمل المتوازن يحسن الكفاءة والاستقرار." },
              ],
            },
            {
              content: "إجراءات الأمان",
              children: [
                {
                  content: "الحفاظ على تحديث البرامج والأنظمة لإغلاق الثغرات.",
                },
                {
                  content:
                    "الوعي بمخاطر الشبكات العامة وغير المحمية وتجنب استخدامها.",
                },
                { content: "إبلاغ المعلم عن أي تهديد أو نشاط مشبوه." },
              ],
            },
            {
              content: "جدار الحماية Firewall",
              children: [
                {
                  content: "حاجز أمني يتحكم في الدخول والخروج من الشبكة.",
                },
                {
                  content: "يحمي من الهجمات السيبرانية والاختراق والفيروسات.",
                },
                { content: "يراقب حركة المرور داخل الشبكة." },
              ],
            },
            {
              content: "الأمن السيبراني Cybersecurity",
              children: [
                {
                  content: "حماية الأنظمة والشبكات من الهجمات الرقمية.",
                },
                {
                  content: "يمنع سرقة البيانات أو تغييرها أو تدميرها.",
                },
                { content: "يضمن الاستخدام الآمن للإنترنت." },
              ],
            },
          ],
        },
        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
