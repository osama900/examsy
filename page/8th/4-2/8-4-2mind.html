<head>
  <script src="../../../js/auth_check.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../css/style.css" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css" />
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #mindmap {
      flex: 1;
      width: 100%;
      background-color: #27272a;
    }

    .instructions {
      padding: 10px;
      padding-top: 80px;
      background-color: #918971;
      color: #333;
      font-size: 16px;
      text-align: center;
      border-bottom: 1px solid #080606;
      font-weight: bolder;
    }

    .markmap-dark {
      background: #27272a;
      color: white;
    }
  </style>
</head>

<body>
  <div class="headerdiv">
    <header class="main-header">
      <div class="header-content">
        <a href="../../../index.html" class="logo-link">
          <span class="logo-emoji">📚</span>
          <span class="logo-text">الاختبارات الالكترونية</span>
        </a>
      </div>
    </header>
  </div>

  <div class="content">
    <!-- التعليمات كنص مستقل -->
    <div class="instructions">
      📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
      و التصغير و التحريك
    </div>

    <!-- mindmap هنا -->
    <svg id="mindmap"></svg>
  </div>

  <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

  <!-- مكتبات markmap -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

  <script>
    (() => {
      setTimeout(() => {
        const { markmap: S, mm: Q } = window,
          $ = new S.Toolbar();
        $.attach(Q);
        const I = $.render();
        I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
        document.body.append(I);
      });
    })();
  </script>
  <script>
    ((l, U, M, R) => {
      const N = l();
      (window.mm = N.Markmap.create(
        "svg#mindmap",
        (U || N.deriveOptions)(R),
        M
      )),
        window.matchMedia("(prefers-color-scheme: dark)").matches &&
        document.documentElement.classList.add("markmap-dark");
    })(
      () => window.markmap,
      null,
      {
        content: "تمدد الشبكة وموثوقيتها وعنونتها 🌐",
        children: [

          {
            content: "تمدد الشبكة (Expansion)",
            children: [
              { content: "تعريفه: زيادة العناصر أو التغطية دون المساس بالأداء." },
              {
                content: "طرق التنفيذ",
                children: [
                  { content: "إضافة أجهزة جديدة (حواسيب ومعدات)." },
                  { content: "توسيع الوسط المادي (كابلات/لاسلكي)." },
                  { content: "تجزئة الشبكة (محولات وموجهات)." },
                  { content: "زيادة عدد الخوادم (Servers)." },
                  { content: "ترقية الأجهزة والمكونات الحالية." }
                ]
              },
              {
                content: "الأهمية",
                children: [
                  { content: "مواجهة تحديات الأعمال." },
                  { content: "تلبية المتطلبات الحالية والمستقبلية." },
                  { content: "دعم عدد أكبر من المستخدمين." }
                ]
              }
            ]
          },

          {
            content: "موثوقية الشبكة (Reliability)",
            children: [
              { content: "تعريفها: العمل المستمر دون انقطاع وضمان أمن البيانات." },
              {
                content: "مؤشرات الموثوقية",
                children: [
                  { content: "التوافر: أنظمة نسخ احتياطي وطوارئ." },
                  { content: "قابلية الصيانة: الإصلاح السريع والفعال." },
                  { content: "الأداء: سرعة التوصيل وجودة الخدمة." },
                  { content: "التكرار: مسارات ومكونات إضافية." },
                  { content: "الأمان: حماية من الهجمات والاختراقات." }
                ]
              },
              {
                content: "طرق تحسينها",
                children: [
                  { content: "تكرار الأجهزة والمسارات." },
                  { content: "النسخ الاحتياطي والتعافي من الكوارث." },
                  { content: "التحديث المستمر للبرمجيات والمعدات." },
                  { content: "استخدام الجدران النارية (Firewalls)." }
                ]
              }
            ]
          },

          {
            content: "عنونة الأجهزة (Addressing)",
            children: [
              {
                content: "العنوان الفيزيائي (MAC Address)",
                children: [
                  { content: "عنوان ثابت من الشركة المصنعة." },
                  { content: "يعمل في طبقة ربط البيانات (Layer 2)." },
                  { content: "يستخدمه المحول (Switch) للتوجيه داخل الشبكة المحلية." }
                ]
              },
              {
                content: "العنوان الرقمي (IP Address)",
                children: [
                  { content: "عنوان منطقي يتغير عند تغيير الشبكة." },
                  { content: "يتكون (IPv4) من 4 مقاطع (0-255)." },
                  {
                    content: "قناع الشبكة (Subnet Mask)",
                    children: [
                      { content: "255: يحدد جزء عنوان الشبكة." },
                      { content: "0: يحدد جزء عنوان الجهاز." }
                    ]
                  }
                ]
              }
            ]
          },

          {
            content: "توجيه الرسائل (Routing)",
            children: [
              { content: "الموجه (Router): يربط الشبكات المختلفة." },
              { content: "البوابة الافتراضية: عنوان منفذ الموجه في الشبكة." },
              {
                content: "قواعد الانتقال عبر الموجه",
                children: [
                  { content: "عنوان IP المصدر والهدف: ثابت دائماً." },
                  { content: "عنوان MAC المصدر والهدف: يتغير في كل مرحلة." }
                ]
              }
            ]
          }

        ]
      },
      { colorFreezeLevel: 2, initialExpandLevel: 2 }
    );
  </script>
