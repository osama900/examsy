<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الرابع - المتغيرات في سكراتش 🧩</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        );
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.classList.add("markmap-dark");
        }
      })(
        () => window.markmap,
        null,
        {
          content: "المتغيرات في برمجية سكراتش",
          children: [
            {
              content: "مكونات المتغيرات في سكراتش",
              children: [
                { content: "اسم المتغير: واضح ومعبر عن وظيفته" },
                { content: "قيمة المتغير: بيانات تتغير أثناء التشغيل" },
                {
                  content: "نوع البيانات",
                  children: [
                    { content: "الأعداد (Numbers): قيم عددية وعمليات حسابية" },
                    { content: "النصوص (Strings): نصوص وأسماء ورسائل" },
                    {
                      content: "القيم المنطقية (Boolean-like)",
                      children: [
                        { content: "تمثيل صحيح/خطأ باستخدام 1 و 0" },
                        { content: "مثال: متغير الحالة لتحديد فوز اللاعب" },
                      ],
                    },
                  ],
                },
              ],
            },
            {
              content: "إنشاء المتغيرات واستخدامها",
              children: [
                {
                  content: "المتغيرات الثابتة (Constants)",
                  children: [
                    { content: "قيم ثابتة لا تتغير أثناء التنفيذ" },
                    { content: "مثال: الحد الأقصى للنقاط = 100" },
                    {
                      content: "خطوات إنشاء متغير ثابت",
                      children: [
                        { content: "اختيار فئة المتغيرات" },
                        { content: "إنشاء متغير جديد" },
                        { content: "تحديده لجميع الكائنات" },
                        { content: "إعطاء قيمة ابتدائية" },
                      ],
                    },
                    {
                      content: "مثال: عدة المحاولات المتبقية = 3",
                    },
                  ],
                },
                {
                  content: "المتغيرات الديناميكية (Dynamic Variables)",
                  children: [
                    { content: "قيم تتغير أثناء تشغيل البرنامج" },
                    {
                      content: "استخداماتها",
                      children: [
                        { content: "تتبع النقاط" },
                        { content: "حساب الوقت" },
                        { content: "إدارة المستويات" },
                        { content: "متابعة حالات اللعبة" },
                      ],
                    },
                    {
                      content: "خطوات إنشاء متغير ديناميكي",
                      children: [
                        { content: "إنشاء متغير جديد" },
                        {
                          content:
                            "اختيار النطاق: لجميع الكائنات أو لكائن واحد",
                        },
                        { content: "إعطاء قيمة ابتدائية" },
                        { content: "استخدام لبنة: غيّر المتغير بمقدار…" },
                      ],
                    },
                    {
                      content: "مثال: حساب عدد الفواكه",
                      children: [
                        { content: "متغير عدد التفاح" },
                        { content: "متغير عدد البرتقال" },
                        { content: "متغير المجموع = مجموعهما" },
                      ],
                    },
                  ],
                },
              ],
            },

            {
              content: "مثال: إضافة متغير نقاط للعبة",
              children: [
                { content: "المتغير يبدأ بـ 0" },
                { content: "يزداد عند النقر على الكائن" },
              ],
            },
            {
              content: "إظهار المتغيرات وإخفاؤها",
              children: [
                {
                  content:
                    "تحكم من فئة المتغيرات في إظهار / إخفاء المتغير على المسرح",
                },
              ],
            },
          ],
        },
        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
