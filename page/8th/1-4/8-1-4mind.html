<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الرابع - اصلاح الاعطال باستخدام ادوات نظام التشغيل 🪛</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,
        {
          content: "اصلاح الاعطال باستخدام ادوات نظام التشغيل",
          children: [
            {
              content: "مقدمة",
              children: [
                {
                  content:
                    "يوفر نظام التشغيل ويندوز مجموعة من الادوات التي تساعد على التعرف على المشكلات و الاخطاء التي يمكن تحصل و المساعدة في اصلاحها",
                },
              ],
            },
            {
              content: "أهم أدوات الصيانة في نظام ويندوز",
              children: [
                {
                  content: "استكشاف الأخطاء واصلاحها ",
                  children: [
                    {
                      content:
                        "يساعد في اكتشاف المشكلات المتعلقة بجهاز الحاسوب وحلها مثل عدم التعرف على الطابعه ",
                    },
                  ],
                },
                {
                  content: "مجلد أدوات ادارة نظام التشغيل",
                  children: [
                    {
                      content:
                        "يحتوي على مجموعة من الادوات التي تساعد على تحسين وتسريع جهاز الحاسوب ",
                    },
                  ],
                },
              ],
            },

            {
              content: "الادوات الادارية لنظام التشغيل",
              children: [
                {
                  content: "الغاء التجزئة / تحسين محركات الاقراص ",
                  children: [
                    {
                      content:
                        "تساعد على اعادة ترتيب البيانات المخزنة على القرص الصلب وتنظيمها ",
                    },
                  ],
                },

                {
                  content: "تنظيف القرص",
                  children: [
                    {
                      content:
                        "الحصول على مساحة خالية من القرص عن طريق ازالة الملفات غير الضرورية وغير المرغوب فيها ",
                    },
                  ],
                },
                {
                  content: "محرك الاسترداد",
                  children: [
                    {
                      content:
                        "يمكن من خلال هذه الاداة عمل وادارة النسخ الاحتياطية للبيانات و البرامج ",
                    },
                  ],
                },
                {
                  content: "تشخيص الذاكرة",
                  children: [
                    {
                      content:
                        "فحص ذاكرة الوصول العشوائي RAM واعطاء تقرير بالمشكلات التي تعاني منها الذاكرة ",
                    },
                  ],
                },
                {
                  content: "مراقب الاداء",
                  children: [
                    {
                      content:
                        "نافذة يمكن من خلالها مراقبة اداء موارد جهاز الحاسوب مثل المعالج و الذاكرة و القرص الصلب و الشبكة",
                    },
                  ],
                },
              ],
            },
          ],
        },
        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
