<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الخامس - لبنات التحكم في سكراتش 🧩</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,
        {
          content: "لبنات التحكم في Scratch",
          children: [
            {
              content: "الفكرة الرئيسة",
              children: [
                {
                  content:
                    "تعلم تصميم برامج تتبع تسلسل منطقي من الأوامر والأحداث باستخدام التتابع، الجمل الشرطية، والتكرار مع إمكانية تصحيح الأخطاء.",
                },
              ],
            },
            {
              content: "المصطلحات والمفاهيم",
              children: [
                { content: "التحكم (Control)" },
                { content: "التكرار (Loop)" },
                { content: "الشروط (Conditions)" },
                { content: "العبارات الشرطية (Condition Statements)" },
                { content: "التتابع (Sequence)" },
              ],
            },
            {
              content: "نتائج التعلم",
              children: [
                { content: "استخدام Scratch لإضافة جمل برمجية بسيطة ومتسلسلة" },
                { content: "تنفيذ الأوامر بناءً على حدث محدد" },
                { content: "تنفيذ الأوامر عند تحقق شرط معين" },
                { content: "استخدام التكرار لعدد محدد أو غير محدد من المرات" },
              ],
            },
            {
              content: "منتج التعلم",
              children: [
                {
                  content:
                    "لعبة تفاعلية مع عداد زمني ومستويات ديناميكية ورسائل مخصصة",
                },
                { content: "تعديل المشاهد والقصص في البرنامج" },
                { content: "اختبار وتصحيح الأخطاء البرمجية" },
                { content: "توثيق المصادر المستخدمة" },
              ],
            },
            {
              content: "التتابع (Sequence)",
              children: [
                {
                  content:
                    "ترتيب الأوامر بحيث تنفذ واحدة تلو الأخرى بطريقة منطقية مثل عرض رسائل أو تحريك الكائنات.",
                },
              ],
            },
            {
              content: "الجمل الشرطية",
              children: [
                { content: "تنفيذ الأوامر عند تحقق شرط معين" },
                { content: "لبنة 'انتظر حتى' - انتظار شرط محدد" },
                { content: "لبنة 'كرر حتى' - تكرار حتى يتحقق الشرط" },
                { content: "لبنة 'إذا' و 'إذا ... وإلا' لتحديد أفعال مختلفة" },
              ],
            },
            {
              content: "التكرار",
              children: [
                {
                  content:
                    "تكرار مجموعة من الأوامر لعدد محدد أو غير محدد من المرات",
                },
                {
                  content:
                    "أنواع حلقات التكرار: 'كرر ... مرة' و 'كرر باستمرار' و 'كرر حتى'",
                },
              ],
            },
            {
              content: "الخلل البرمجي (Bug)",
              children: [
                { content: "أخطاء تؤدي إلى سلوك غير متوقع" },
                { content: "اختبار البرنامج وتصحيح الأخطاء" },
                { content: "استخدام لوحة التصحيح (Debugging) في Scratch" },
              ],
            },

            {
              content: "تطوير اللعبة",
              children: [
                { content: "إضافة عداد زمني تنازلي" },
                { content: "إدراج المستويات وزيادة الصعوبة تدريجيًا" },
                { content: "تحسين التفاعل الديناميكي باستخدام المتغيرات" },
                { content: "تجربة اللعبة وجمع التغذية الراجعة وتحسين المشروع" },
              ],
            },
          ],
        },
        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
