<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الثالث - عناصر البرمجة في برمجية سكراتش 🧩</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,
        {
          content: "اللبنات البرمجية في Scratch",
          children: [
            {
              content: "مفهوم اللبنات البرمجية",
              children: [
                {
                  content:
                    "هي أوامر جاهزة تُستخدم لبناء البرامج في سكراتش بطريقة السحب والإفلات.",
                },
                {
                  content:
                    "تُسهل على المبتدئين تعلم البرمجة دون الحاجة لكتابة أكواد نصية.",
                },
                {
                  content:
                    "تُرتب اللبنات معًا لتكوين تسلسل منطقي من الأوامر يتحكم في الكائنات.",
                },
              ],
            },
            {
              content: "أنواع اللبنات البرمجية",
              children: [
                {
                  content: "لبنات الحركة",
                  children: [
                    { content: "تُستخدم لتحريك الكائنات في المسرح." },
                    {
                      content:
                        "أمثلة: تحريك الكائن 10 خطوات، التوجه نحو مؤشر الفأرة.",
                    },
                  ],
                },
                {
                  content: "لبنات المظهر",
                  children: [
                    { content: "تُغيّر شكل الكائن أو لونه أو مظهره." },
                    {
                      content:
                        "أمثلة: تغيير الخلفية، أو جعل الكائن يقول نصاً معيناً.",
                    },
                  ],
                },
                {
                  content: "لبنات الصوت",
                  children: [
                    {
                      content: "تتحكم في تشغيل الأصوات أو الموسيقى في المشروع.",
                    },
                    {
                      content:
                        "أمثلة: تشغيل صوت عند حدث معين أو عند اصطدام الكائن.",
                    },
                  ],
                },
                {
                  content: "لبنات الأحداث",
                  children: [
                    { content: "تبدأ تنفيذ الأوامر عند حدوث حدث معين." },
                    {
                      content:
                        "مثال: عند النقر على العلم الأخضر يبدأ البرنامج.",
                    },
                  ],
                },
                {
                  content: "لبنات التحكم",
                  children: [
                    {
                      content: "تتحكم في تكرار الأوامر أو تنفيذها بشروط محددة.",
                    },
                    {
                      content:
                        "أمثلة: كرر 10 مرات، إذا تحقق الشرط فقم بتنفيذ أمر معين.",
                    },
                  ],
                },
                {
                  content: "لبنات العمليات",
                  children: [
                    { content: "تُستخدم لإجراء العمليات الحسابية والمنطقية." },
                    { content: "أمثلة: الجمع، الطرح، المقارنة بين القيم." },
                  ],
                },
                {
                  content: "لبنات المتغيرات",
                  children: [
                    { content: "تُخزن بيانات يمكن تغييرها أثناء التنفيذ." },
                    {
                      content: "أمثلة: حفظ عدد النقاط أو الوقت أو اسم اللاعب.",
                    },
                  ],
                },
                {
                  content: "لبنات الاستشعار",
                  children: [
                    { content: "تتعامل مع تفاعل المستخدم أو البيئة المحيطة." },
                    {
                      content:
                        "أمثلة: اكتشاف لمس كائن معين أو قراءة إجابة المستخدم.",
                    },
                  ],
                },
              ],
            },
            {
              content: "أهمية استخدام اللبنات البرمجية",
              children: [
                { content: "تُبسط تعلم البرمجة وتجعلها ممتعة وسهلة." },
                { content: "تنمي مهارات التفكير المنطقي وحل المشكلات." },
                {
                  content:
                    "تتيح إنشاء مشاريع تفاعلية تجمع بين الصوت والصورة والحركة.",
                },
              ],
            },
            {
              content: "تطبيق عملي",
              children: [
                {
                  content:
                    "إنشاء قصة أو لعبة بسيطة باستخدام لبنات الحركة والمظهر والتحكم.",
                },
                {
                  content:
                    "دمج لبنات الأحداث والمتغيرات لتنظيم تسلسل الأحداث داخل المشروع.",
                },
              ],
            },
          ],
        },
        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
