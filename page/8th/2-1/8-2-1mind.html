<!DOCTYPE html>
<html>
  <head>
    <script src="../../../js/auth_check.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدرس الاول - مقدمة في برمجية سكراتش 🕹️</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/style.css" />

    <!-- markmap toolbar css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #mindmap {
        flex: 1;
        width: 100%;
        background-color: #27272a;
      }

      .instructions {
        padding: 10px;
        padding-top: 80px;
        background-color: #918971;
        color: #333;
        font-size: 16px;
        text-align: center;
        border-bottom: 1px solid #080606;
        font-weight: bolder;
      }

      .markmap-dark {
        background: #27272a;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="headerdiv">
      <header class="main-header">
        <div class="header-content">
          <a href="../../../index.html" class="logo-link">
            <span class="logo-emoji">📚</span>
            <span class="logo-text">الاختبارات الالكترونية</span>
          </a>
        </div>
      </header>
    </div>

    <div class="content">
      <!-- التعليمات كنص مستقل -->
      <div class="instructions">
        📌 التعليمات : يجب النقر على الدائرة الممتلئة لفتح الشرح و يمكن التكبير
        و التصغير و التحريك
      </div>

      <!-- mindmap هنا -->
      <svg id="mindmap"></svg>
    </div>

    <footer>جميع الحقوق محفوظة © Teacher Osama Omar</footer>

    <!-- مكتبات markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

    <script>
      (() => {
        setTimeout(() => {
          const { markmap: S, mm: Q } = window,
            $ = new S.Toolbar();
          $.attach(Q);
          const I = $.render();
          I.setAttribute("style", "position:absolute;bottom:20px;right:20px");
          document.body.append(I);
        });
      })();
    </script>

    <script>
      ((l, U, M, R) => {
        const N = l();
        (window.mm = N.Markmap.create(
          "svg#mindmap",
          (U || N.deriveOptions)(R),
          M
        )),
          window.matchMedia("(prefers-color-scheme: dark)").matches &&
            document.documentElement.classList.add("markmap-dark");
      })(
        () => window.markmap,
        null,
        {
          content: "تعلم البرمجة باستخدام Scratch",
          children: [
            {
              content: "مفهوم الأوامر البرمجية",
              children: [
                {
                  content:
                    "تشبه البرمجة ترتيب خطوات النشاط اليومي، وتعتمد على سلسلة تعليمات دقيقة تعرف بالكود البرمجي لتنفيذ المهام بدقة.",
                },
              ],
            },
            {
              content: "المبرمج ودوره",
              children: [
                {
                  content:
                    "المبرمج يقوم بتحليل المتطلبات وتصميم البرامج وكتابة الأكواد واختبارها وصيانتها باستخدام لغات برمجة متعددة.",
                },
              ],
            },
            {
              content: "التعرف على Scratch",
              children: [
                {
                  content:
                    "منصة برمجة مرئية تعتمد على اللبنات البرمجية (Blocks) لتسهيل إنشاء ألعاب، قصص، رسوم متحركة، ومشروعات إبداعية للمبتدئين.",
                },
              ],
            },
            {
              content: "مكونات الشاشة الرئيسة في Scratch",
              children: [
                {
                  content:
                    "زر تسجيل الدخول، القائمة، لوحة اللبنات البرمجية، منطقة البرمجة، الكائن (Sprite)، لوحة الكائنات، المنصة (Stage)، وأدوات التكبير والتصغير.",
                },
              ],
            },
            {
              content: "مكونات المشروع في Scratch",
              children: [
                {
                  content: "عناصر التصميم",
                  children: [
                    {
                      content:
                        "الكائنات (Sprites)، الخلفيات (Backdrops)، الأصوات (Sounds) لتعزيز التفاعل والجاذبية.",
                    },
                  ],
                },
                {
                  content: "عناصر البرمجة",
                  children: [
                    {
                      content:
                        "اللبنات البرمجية التي تتحكم بسلوك الكائنات وطريقة تفاعلها، تُسحب وتُرتب في منطقة البرمجة.",
                    },
                  ],
                },
              ],
            },

            {
              content: "المحافظة على الأمان والخصوصية",
              children: [
                {
                  content:
                    "إنشاء كلمات مرور قوية، حفظ بيانات الحسابات في مكان آمن، واحترام حقوق الملكية الفكرية عند استخدام المشاريع الجاهزة.",
                },
              ],
            },
          ],
        },
        { colorFreezeLevel: 2, initialExpandLevel: 2 }
      );
    </script>
  </body>
</html>
