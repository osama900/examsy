<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال إشعار للطلاب</title>
    <style>
        body {
            font-family: "Tajawal", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #8e44ad;
            padding-bottom: 10px;
            display: inline-block;
        }

        .header-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }

        .student-list-container {
            border: 1px solid #ced6e0;
            border-radius: 8px;
            background: #f9f9f9;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .student-item:hover {
            background: #f0f4f8;
        }

        .student-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .select-all-wrapper {
            padding: 8px;
            border-bottom: 2px solid #ddd;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced6e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .form-control:focus {
            border-color: #8e44ad;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
        }

        .form-control:disabled {
            background: #e9ecef;
            cursor: not-allowed;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .send-btn {
            background: #8e44ad;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .send-btn:hover {
            background: #732d91;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.3);
        }

        .send-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: #7f8c8d;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-wrapper">
            <h1>📢 إرسال إشعار للطلاب</h1>
        </div>

        <!-- Filters First -->
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label for="filterGrade">الصف</label>
                <select id="filterGrade" class="form-control">
                    <option value="">-- اختر الصف --</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="filterClass">الشعبة</label>
                <select id="filterClass" class="form-control" disabled>
                    <option value="">-- اختر الشعبة --</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>المستلمون <span id="selectedCount" style="font-weight: normal; font-size: 0.9em; color: #8e44ad;">(0
                    مختار)</span></label>
            <div class="student-list-container">
                <div class="select-all-wrapper">
                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)">
                    <label for="selectAll" style="margin: 0; cursor: pointer;">تحديد الكل</label>
                </div>
                <div id="studentCheckboxes">
                    <div style="text-align: center; color: #95a5a6; padding: 20px;">جاري تحميل الطلاب...</div>
                </div>
            </div>
        </div>

        <!-- Content Second -->
        <div class="form-group">
            <label for="notifTitle">عنوان الإشعار</label>
            <input type="text" id="notifTitle" class="form-control" placeholder="مثال: تذكير بموعد الامتحان">
        </div>

        <div class="form-group">
            <label for="notifMessage">نص الإشعار</label>
            <textarea id="notifMessage" class="form-control" placeholder="اكتب رسالتك هنا..."></textarea>
        </div>

        <button class="send-btn" onclick="sendNotification()" id="sendBtn">
            🚀 إرسال الإشعار
        </button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        
        <!-- Replies Section -->
        <div class="header-wrapper" style="margin-bottom: 20px;">
            <h2 style="color: #2c3e50; text-align: center; font-size: 20px; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 5px;">💬 ردود الطلاب على الإشعارات</h2>
        </div>
        <div class="replies-container" id="repliesContainer" style="border: 1px solid #ced6e0; border-radius: 8px; background: #f9f9f9; max-height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 20px;">
            <div style="text-align: center; color: #95a5a6; padding: 20px;">جاري تحميل الردود...</div>
        </div>

        <div style="text-align: center;">
            <a href="teacher_dashboard.html" class="back-btn">⬅ العودة للوحة التحكم</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAiJVhRbPOR0ty2Zaoyu4FQj9U4_rpnCf8",
            authDomain: "examsy-21dc3.firebaseapp.com",
            projectId: "examsy-21dc3",
            storageBucket: "examsy-21dc3.firebasestorage.app",
            messagingSenderId: "357464025229",
            appId: "1:357464025229:web:b920c8290f985f54339ac4",
            measurementId: "G-CWZ7MR4V26",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Auth Check
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login_teacher.html";
            }
        });

        let allStudents = [];

        // Load students & Init Filters
        document.addEventListener('DOMContentLoaded', () => {
            db.collection("std_id").get().then(snapshot => {
                allStudents = [];
                snapshot.forEach(doc => {
                    const s = doc.data();
                    allStudents.push({
                        id: doc.id,
                        name: s.std_name || "بدون اسم",
                        grade: (s.std_grade || "").trim(), // e.g. "9"
                        section: (s.std_class || "").trim(), // e.g. "أ"
                        meta: `${s.std_grade || ""} - ${s.std_class || ""}`
                    });
                });

                // Sort by Name
                allStudents.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

                // Populate Grades Filter
                populateGrades();

                // Initial Populate
                populateTargetList(allStudents);

            }).catch(err => console.error("Error loading students:", err));
        });

        const gradeSelect = document.getElementById('filterGrade');
        const classSelect = document.getElementById('filterClass');
        const studentCheckboxes = document.getElementById('studentCheckboxes');
        const selectAllCheckbox = document.getElementById('selectAll');
        const selectedCountSpan = document.getElementById('selectedCount');

        function populateGrades() {
            const grades = [...new Set(allStudents.map(s => s.grade).filter(g => g))];
            grades.sort();

            grades.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = `الصف ${g}`;
                gradeSelect.appendChild(opt);
            });
        }

        gradeSelect.addEventListener('change', () => {
            const selectedGrade = gradeSelect.value;
            classSelect.innerHTML = '<option value="">-- كل الشعب --</option>';
            classSelect.disabled = !selectedGrade;

            if (!selectedGrade) {
                populateTargetList(allStudents);
            } else {
                const sections = [...new Set(allStudents.filter(s => s.grade === selectedGrade).map(s => s.section).filter(s => s))];
                sections.sort();
                sections.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = `شعبة ${s}`;
                    classSelect.appendChild(opt);
                });
                filterStudents();
            }
        });

        classSelect.addEventListener('change', filterStudents);

        function filterStudents() {
            const grade = gradeSelect.value;
            const section = classSelect.value;
            let filtered = allStudents;
            if (grade) filtered = filtered.filter(s => s.grade === grade);
            if (section) filtered = filtered.filter(s => s.section === section);
            populateTargetList(filtered);
        }

        function populateTargetList(list) {
            studentCheckboxes.innerHTML = '';
            selectAllCheckbox.checked = false;
            updateSelectedCount();

            if (list.length === 0) {
                studentCheckboxes.innerHTML = '<div style="text-align: center; color: #95a5a6; padding: 20px;">لا يوجد طلاب مطابقين</div>';
                return;
            }

            list.forEach(s => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <input type="checkbox" id="chk_${s.id}" value="${s.id}" class="student-chk" onchange="updateSelectedCount()">
                    <label for="chk_${s.id}" style="cursor: pointer; flex: 1;">${s.name} <span style="color: #95a5a6; font-size: 0.8em;">(${s.meta})</span></label>
                `;
                studentCheckboxes.appendChild(div);
            });
        }

        function toggleSelectAll(checked) {
            const chks = document.querySelectorAll('.student-chk');
            chks.forEach(c => c.checked = checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checked = document.querySelectorAll('.student-chk:checked').length;
            selectedCountSpan.textContent = `(${checked} مختار)`;
        }

        async function sendNotification() {
            const title = document.getElementById('notifTitle').value.trim();
            const body = document.getElementById('notifMessage').value.trim();
            const checkedChks = document.querySelectorAll('.student-chk:checked');
            const btn = document.getElementById('sendBtn');

            if (!title || !body) {
                alert("يرجى تعبئة العنوان والنص");
                return;
            }

            if (checkedChks.length === 0) {
                alert("يرجى اختيار طالب واحد على الأقل");
                return;
            }

            if (!confirm(`هل أنت متأكد من إرسال هذا الإشعار إلى ${checkedChks.length} طالب؟`)) return;

            btn.disabled = true;
            btn.textContent = "جاري الإرسال...";

            try {
                const timestamp = firebase.firestore.FieldValue.serverTimestamp();
                const promises = [];

                // Individual adds for each selected student
                checkedChks.forEach(chk => {
                    promises.push(
                        db.collection("notifications").add({
                            title, body, target: chk.value, timestamp, sender: "Teacher"
                        })
                    );
                });

                await Promise.all(promises);

                alert("تم الإرسال بنجاح! ✅");
                document.getElementById('notifTitle').value = "";
                document.getElementById('notifMessage').value = "";
                // Reset Selection
                toggleSelectAll(false);
                selectAllCheckbox.checked = false;

            } catch (err) {
                console.error("Error sending notification:", err);
                alert("حدث خطأ أثناء الإرسال ❌");
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 إرسال الإشعار";
            }
        }

        // --- Load Student Replies ---
        function loadReplies() {
            const repliesContainer = document.getElementById('repliesContainer');
            db.collection('notification_replies').orderBy('timestamp', 'desc').limit(50).onSnapshot(snapshot => {
                repliesContainer.innerHTML = '';
                if (snapshot.empty) {
                    repliesContainer.innerHTML = '<div style="text-align: center; color: #95a5a6; padding: 20px;">لا يوجد ردود حتى الآن</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const r = doc.data();
                    const date = r.timestamp ? r.timestamp.toDate().toLocaleString('ar-EG') : 'الآن';
                    
                    const item = document.createElement('div');
                    item.style.cssText = `
                        background: white;
                        padding: 15px;
                        border-radius: 8px;
                        margin-bottom: 10px;
                        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
                        border-right: 4px solid #3498db;
                        position: relative;
                    `;
                    
                    item.innerHTML = `
                        <button onclick="deleteReply('${doc.id}')" style="position:absolute; left:10px; top:10px; background:none; border:none; color:#e74c3c; cursor:pointer; font-size:16px;" title="حذف الرد">❌</button>
                        <div style="font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 14px;">
                            ${r.studentName} <span style="color: #7f8c8d; font-size: 12px;">(${r.studentClassInfo})</span>
                        </div>
                        <div style="font-size: 13px; color: #8e44ad; margin-bottom: 8px;">
                            ردًا على: "${r.notificationTitle}"
                        </div>
                        <div style="color: #34495e; font-size: 15px; line-height: 1.5; background: #fdfdfd; padding: 10px; border-radius: 5px; border: 1px solid #eee;">
                            ${r.message}
                        </div>
                        <div style="text-align: left; font-size: 11px; color: #bdc3c7; margin-top: 5px;">
                            ${date}
                        </div>
                    `;
                    repliesContainer.appendChild(item);
                });
            }, err => {
                console.error("Error loading replies:", err);
                repliesContainer.innerHTML = '<div style="text-align: center; color: #e74c3c; padding: 20px;">خطأ في تحميل الردود. تأكد من إعدادات الفايربيس.</div>';
            });
        }

        async function deleteReply(docId) {
            if(!confirm('هل أنت متأكد من حذف هذا الرد؟')) return;
            try {
                await db.collection('notification_replies').doc(docId).delete();
            } catch(e) {
                console.error('Error deleting reply', e);
                alert('حدث خطأ أثناء الحذف');
            }
        }

        // Call loadReplies on init
        document.addEventListener('DOMContentLoaded', loadReplies);
    </script>

</body>

</html>
