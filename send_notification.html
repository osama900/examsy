<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال إشعار للطلاب</title>
    <style>
        body {
            font-family: "Tajawal", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #8e44ad;
            padding-bottom: 10px;
            display: inline-block;
        }

        .header-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }

        .student-list-container {
            border: 1px solid #ced6e0;
            border-radius: 8px;
            background: #f9f9f9;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .student-item:hover {
            background: #f0f4f8;
        }

        .student-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .select-all-wrapper {
            padding: 8px;
            border-bottom: 2px solid #ddd;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced6e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .form-control:focus {
            border-color: #8e44ad;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
        }

        .form-control:disabled {
            background: #e9ecef;
            cursor: not-allowed;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .send-btn {
            background: #8e44ad;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .send-btn:hover {
            background: #732d91;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.3);
        }

        .send-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: #7f8c8d;
        }

        .search-btn {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            align-self: flex-end;
            height: 45px;
        }

        .search-btn:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }

        /* --- WhatsApp Split Pane Layout --- */
        .chat-layout {
            display: flex;
            border: 1px solid #ced6e0;
            border-radius: 12px;
            height: 520px;
            overflow: hidden;
            background: #efeae2;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .chat-sidebar {
            width: 38%;
            background: #ffffff;
            border-left: 1px solid #ced6e0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-sidebar-header {
            padding: 15px;
            background: #f0f2f5;
            border-bottom: 1px solid #e9edef;
            font-weight: bold;
            color: #2c3e50;
            font-size: 15px;
        }

        .chat-threads-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-thread-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: right;
        }

        .chat-thread-item:hover {
            background: #f0f2f5;
        }

        .chat-thread-item.active {
            background: #eae6df;
            border-right: 4px solid #3498db;
        }

        .thread-student-name {
            font-weight: bold;
            color: #111b21;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thread-meta {
            font-size: 11px;
            color: #667781;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .thread-snippet {
            font-size: 12px;
            color: #667781;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .chat-viewport {
            width: 62%;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background: #efeae2;
        }

        .chat-viewport-header {
            padding: 12px 15px;
            background: #f0f2f5;
            border-bottom: 1px solid #e9edef;
            display: flex;
            flex-direction: column;
            gap: 3px;
            text-align: right;
        }

        .chat-header-title {
            font-weight: bold;
            color: #111b21;
            font-size: 15px;
        }

        .chat-header-subtitle {
            font-size: 11px;
            color: #667781;
        }

        .chat-viewport-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-bubble {
            max-width: 75%;
            padding: 8px 12px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
            word-break: break-word;
        }

        .chat-bubble-student {
            align-self: flex-start;
            background: #ffffff;
            color: #111b21;
            border-radius: 16px 16px 16px 4px;
        }

        .chat-bubble-teacher {
            align-self: flex-end;
            background: #d9fdd3;
            color: #111b21;
            border-radius: 16px 16px 4px 16px;
        }

        .bubble-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            color: #8696a0;
            margin-top: 4px;
        }

        .delete-msg-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            padding: 0;
            font-size: 11px;
            opacity: 0.6;
            transition: opacity 0.2s;
            margin-right: 5px;
        }

        .delete-msg-btn:hover {
            opacity: 1;
        }

        .chat-viewport-footer {
            padding: 10px 15px;
            background: #f0f2f5;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #e9edef;
        }

        .chat-input-field {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ced6e0;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            background: #ffffff;
            box-sizing: border-box;
        }

        .chat-send-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .chat-send-btn:hover {
            background: #219653;
        }

        .chat-send-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .chat-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #667781;
            gap: 15px;
            text-align: center;
            padding: 20px;
        }

        .chat-placeholder-icon {
            font-size: 56px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <a href="teacher_dashboard.html" class="back-btn" style="margin-top: 0;">⬅ العودة</a>
                <h1 style="margin-bottom: 0;">📢 إرسال إشعار للطلاب</h1>
                <div style="width: 80px;"></div> <!-- Spacer for centering title -->
            </div>
        </div>

        <!-- Filters First -->
        <div class="form-group" style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 2;">
                <label for="filterGrade">الصف</label>
                <select id="filterGrade" class="form-control">
                    <option value="">-- اختر الصف --</option>
                </select>
            </div>
            <div style="flex: 2;">
                <label for="filterClass">الشعبة</label>
                <select id="filterClass" class="form-control" disabled>
                    <option value="">-- اختر الشعبة --</option>
                </select>
            </div>
            <div style="flex: 1;">
                <button class="search-btn" onclick="filterStudents()">
                    🔍 بحث
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>المستلمون <span id="selectedCount" style="font-weight: normal; font-size: 0.9em; color: #8e44ad;">(0
                    مختار)</span></label>
            <div class="student-list-container">
                <div class="select-all-wrapper">
                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)">
                    <label for="selectAll" style="margin: 0; cursor: pointer;">تحديد الكل</label>
                </div>
                <div id="studentCheckboxes">
                    <div style="text-align: center; color: #95a5a6; padding: 20px;">يرجى اختيار الصف والشعبة ثم الضغط على "بحث" لإظهار الطلاب.</div>
                </div>
            </div>
        </div>

        <!-- Content Second -->
        <div class="form-group">
            <label for="notifTitle">عنوان الإشعار</label>
            <input type="text" id="notifTitle" class="form-control" placeholder="مثال: تذكير بموعد الامتحان">
        </div>

        <div class="form-group">
            <label for="notifMessage">نص الإشعار</label>
            <textarea id="notifMessage" class="form-control" placeholder="اكتب رسالتك هنا..."></textarea>
        </div>

        <button class="send-btn" onclick="sendNotification()" id="sendBtn">
            🚀 إرسال الإشعار
        </button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        
        <!-- Replies Section -->
        <div class="header-wrapper" style="margin-bottom: 20px;">
            <h2 style="color: #2c3e50; text-align: center; font-size: 20px; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 5px;">💬 ردود الطلاب على الإشعارات</h2>
        </div>
        
        <div class="chat-layout">
            <!-- Sidebar with list of students/threads -->
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">الدردشات النشطة</div>
                <div class="chat-threads-list" id="chatThreadsList">
                    <div style="text-align: center; color: #95a5a6; padding: 20px; font-size: 13px;">جاري تحميل الردود...</div>
                </div>
            </div>
            
            <!-- Viewport for active chat thread -->
            <div class="chat-viewport" id="chatViewport">
                <div class="chat-placeholder">
                    <span class="chat-placeholder-icon">💬</span>
                    <div>اختر محادثة من القائمة لبدء القراءة والرد على الطلاب</div>
                </div>
            </div>
        </div>

        <!-- Replies Section (moved button to top) -->
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAiJVhRbPOR0ty2Zaoyu4FQj9U4_rpnCf8",
            authDomain: "examsy-21dc3.firebaseapp.com",
            projectId: "examsy-21dc3",
            storageBucket: "examsy-21dc3.firebasestorage.app",
            messagingSenderId: "357464025229",
            appId: "1:357464025229:web:b920c8290f985f54339ac4",
            measurementId: "G-CWZ7MR4V26",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Auth Check
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "login_teacher.html";
            }
        });

        let allStudents = [];

        // Load students & Init Filters
        document.addEventListener('DOMContentLoaded', () => {
            db.collection("std_id").get().then(snapshot => {
                allStudents = [];
                snapshot.forEach(doc => {
                    const s = doc.data();
                    allStudents.push({
                        id: doc.id,
                        name: s.std_name || "بدون اسم",
                        grade: (s.std_grade || "").trim(), // e.g. "9"
                        section: (s.std_class || "").trim(), // e.g. "أ"
                        meta: `${s.std_grade || ""} - ${s.std_class || ""}`
                    });
                });

                // Sort by Name
                allStudents.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

                // Populate Grades Filter
                populateGrades();

                // Wait for search
                // populateTargetList(allStudents); // Removed to start empty

            }).catch(err => console.error("Error loading students:", err));
        });

        const gradeSelect = document.getElementById('filterGrade');
        const classSelect = document.getElementById('filterClass');
        const studentCheckboxes = document.getElementById('studentCheckboxes');
        const selectAllCheckbox = document.getElementById('selectAll');
        const selectedCountSpan = document.getElementById('selectedCount');

        function populateGrades() {
            const grades = [...new Set(allStudents.map(s => s.grade).filter(g => g))];
            grades.sort();

            grades.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = `الصف ${g}`;
                gradeSelect.appendChild(opt);
            });
        }

        gradeSelect.addEventListener('change', () => {
            const selectedGrade = gradeSelect.value;
            classSelect.innerHTML = '<option value="">-- كل الشعب --</option>';
            classSelect.disabled = !selectedGrade;

            if (selectedGrade) {
                let sections = [];
                if (selectedGrade === "7") {
                    sections = ["أ", "ب"];
                } else if (selectedGrade === "8") {
                    sections = ["أ", "ب", "ج", "د", "هـ", "و"];
                } else if (selectedGrade === "9") {
                    sections = ["أ", "ب", "ج", "د", "هـ"];
                } else {
                    sections = [...new Set(allStudents.filter(s => s.grade === selectedGrade).map(s => s.section).filter(s => s))];
                    sections.sort();
                }
                sections.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = `شعبة ${s}`;
                    classSelect.appendChild(opt);
                });
            }
        });

        // classSelect.addEventListener('change', filterStudents); // Removed to wait for search button

        function filterStudents() {
            const grade = gradeSelect.value;
            const section = classSelect.value;

            if (!grade) {
                alert("يرجى اختيار الصف أولاً");
                return;
            }

            let filtered = allStudents;
            if (grade) filtered = filtered.filter(s => s.grade === grade);
            if (section) filtered = filtered.filter(s => s.section === section);
            
            populateTargetList(filtered);
        }

        function populateTargetList(list) {
            studentCheckboxes.innerHTML = '';
            selectAllCheckbox.checked = false;
            updateSelectedCount();

            if (list.length === 0) {
                studentCheckboxes.innerHTML = '<div style="text-align: center; color: #95a5a6; padding: 20px;">لا يوجد طلاب مطابقين</div>';
                return;
            }

            list.forEach(s => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <input type="checkbox" id="chk_${s.id}" value="${s.id}" class="student-chk" onchange="updateSelectedCount()">
                    <label for="chk_${s.id}" style="cursor: pointer; flex: 1;">${s.name} <span style="color: #95a5a6; font-size: 0.8em;">(${s.meta})</span></label>
                `;
                studentCheckboxes.appendChild(div);
            });
        }

        function toggleSelectAll(checked) {
            const chks = document.querySelectorAll('.student-chk');
            chks.forEach(c => c.checked = checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checked = document.querySelectorAll('.student-chk:checked').length;
            selectedCountSpan.textContent = `(${checked} مختار)`;
        }

        async function sendNotification() {
            const title = document.getElementById('notifTitle').value.trim();
            const body = document.getElementById('notifMessage').value.trim();
            const checkedChks = document.querySelectorAll('.student-chk:checked');
            const btn = document.getElementById('sendBtn');

            if (!title || !body) {
                alert("يرجى تعبئة العنوان والنص");
                return;
            }

            if (checkedChks.length === 0) {
                alert("يرجى اختيار طالب واحد على الأقل");
                return;
            }

            if (!confirm(`هل أنت متأكد من إرسال هذا الإشعار إلى ${checkedChks.length} طالب؟`)) return;

            btn.disabled = true;
            btn.textContent = "جاري الإرسال...";

            try {
                const timestamp = firebase.firestore.FieldValue.serverTimestamp();
                const promises = [];

                // Individual adds for each selected student
                checkedChks.forEach(chk => {
                    promises.push(
                        db.collection("notifications").add({
                            title, body, target: chk.value, timestamp, sender: "Teacher"
                        })
                    );
                });

                await Promise.all(promises);

                alert("تم الإرسال بنجاح! ✅");
                document.getElementById('notifTitle').value = "";
                document.getElementById('notifMessage').value = "";
                // Reset Selection
                toggleSelectAll(false);
                selectAllCheckbox.checked = false;

            } catch (err) {
                console.error("Error sending notification:", err);
                alert("حدث خطأ أثناء الإرسال ❌");
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 إرسال الإشعار";
            }
        }

        function escapeHTML(str) {
            if (!str) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // --- Load All Notifications & Replies, Merge Into Threads ---
        let activeThreads = {};
        let selectedThreadKey = null;
        let dbNotifications = [];
        let dbReplies = [];

        function loadReplies() {
            // 1. Listen to all notifications (filter teacher-sent individual ones in memory)
            db.collection('notifications')
                .orderBy('timestamp', 'desc')
                .limit(200)
                .onSnapshot(snapshot => {
                    dbNotifications = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        // Only include teacher-sent notifications to individual students (not "all", not reply copies)
                        if (data.target && data.target !== 'all' && !data.replyToNotificationId) {
                            dbNotifications.push({ id: doc.id, ...data });
                        }
                    });
                    processAndRenderThreads();
                }, err => {
                    console.error("Error loading notifications:", err);
                });

            // 2. Listen to notification replies
            db.collection('notification_replies')
                .orderBy('timestamp', 'desc')
                .limit(200)
                .onSnapshot(snapshot => {
                    dbReplies = [];
                    snapshot.forEach(doc => {
                        dbReplies.push({ id: doc.id, ...doc.data() });
                    });
                    processAndRenderThreads();
                }, err => {
                    console.error("Error loading replies:", err);
                });
        }

        function processAndRenderThreads() {
            const chatThreadsList = document.getElementById('chatThreadsList');
            const threads = {};

            // Helper to lookup student info from the allStudents array
            const getStudentInfo = (studentId) => {
                const s = allStudents.find(std => std.id === studentId);
                return {
                    name: s ? s.name : 'طالب',
                    classInfo: s ? `${s.grade} - ${s.section}` : ''
                };
            };

            // A. Create threads from sent notifications (original messages)
            dbNotifications.forEach(n => {
                const studentId = n.target;
                const key = `${n.id}_${studentId}`;
                const stdInfo = getStudentInfo(studentId);

                threads[key] = {
                    key: key,
                    notificationId: n.id,
                    notificationTitle: n.title || 'بدون عنوان',
                    studentId: studentId,
                    studentName: stdInfo.name,
                    studentClassInfo: stdInfo.classInfo,
                    messages: [
                        {
                            id: `notif_${n.id}`,
                            sender: 'Teacher',
                            message: n.body || n.message || '',
                            timestamp: n.timestamp,
                            isOriginal: true
                        }
                    ],
                    latestTimestamp: n.timestamp
                };
            });

            // B. Merge replies into threads
            dbReplies.forEach(r => {
                const key = `${r.notificationId}_${r.studentId}`;
                const stdInfo = getStudentInfo(r.studentId);

                if (!threads[key]) {
                    // Reply exists but original notification wasn't fetched (edge case)
                    threads[key] = {
                        key: key,
                        notificationId: r.notificationId,
                        notificationTitle: r.notificationTitle || 'بدون عنوان',
                        studentId: r.studentId,
                        studentName: stdInfo.name || r.studentName || 'طالب',
                        studentClassInfo: stdInfo.classInfo || r.studentClassInfo || '',
                        messages: [],
                        latestTimestamp: r.timestamp
                    };
                }

                // Add reply message (avoid duplicates)
                if (!threads[key].messages.some(m => m.id === r.id)) {
                    threads[key].messages.push(r);
                }

                // Update latest timestamp
                if (r.timestamp) {
                    if (!threads[key].latestTimestamp || r.timestamp.seconds > threads[key].latestTimestamp.seconds) {
                        threads[key].latestTimestamp = r.timestamp;
                    }
                }
            });

            // Handle empty state
            if (Object.keys(threads).length === 0) {
                chatThreadsList.innerHTML = '<div style="text-align: center; color: #95a5a6; padding: 20px; font-size: 13px;">لا توجد إشعارات أو ردود حالياً</div>';
                document.getElementById('chatViewport').innerHTML = `
                    <div class="chat-placeholder">
                        <span class="chat-placeholder-icon">💬</span>
                        <div>لا توجد محادثات نشطة</div>
                    </div>
                `;
                activeThreads = {};
                return;
            }

            activeThreads = threads;

            // Auto-select first thread if none selected or selected no longer exists
            const sortedKeys = Object.keys(threads).sort((a, b) => {
                const t1 = threads[a].latestTimestamp ? threads[a].latestTimestamp.seconds : 0;
                const t2 = threads[b].latestTimestamp ? threads[b].latestTimestamp.seconds : 0;
                return t2 - t1;
            });

            if (!selectedThreadKey || !threads[selectedThreadKey]) {
                if (sortedKeys.length > 0) {
                    selectedThreadKey = sortedKeys[0];
                }
            }

            renderChatUI();
        }

        function renderChatUI() {
            const chatThreadsList = document.getElementById('chatThreadsList');
            const chatViewport = document.getElementById('chatViewport');

            // Sort threads by latest activity descending
            const sortedThreads = Object.values(activeThreads).sort((a, b) => {
                const t1 = a.latestTimestamp ? a.latestTimestamp.seconds : 0;
                const t2 = b.latestTimestamp ? b.latestTimestamp.seconds : 0;
                return t2 - t1;
            });

            // Render threads list
            chatThreadsList.innerHTML = '';
            sortedThreads.forEach(thread => {
                thread.messages.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                const lastMsgObj = thread.messages[thread.messages.length - 1];
                const lastMsgText = lastMsgObj ? lastMsgObj.message : '';
                const lastMsgSender = lastMsgObj?.sender === 'Teacher' ? 'أنت: ' : '';
                
                // Count student replies only (not teacher messages)
                const replyCount = thread.messages.filter(m => !m.isOriginal && m.sender !== 'Teacher').length;

                let lastMsgDate = 'الآن';
                if (lastMsgObj?.timestamp) {
                    const date = lastMsgObj.timestamp.toDate();
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    lastMsgDate = `${hours}:${minutes}`;
                }

                const isActive = thread.key === selectedThreadKey;
                const threadEl = document.createElement('div');
                threadEl.className = `chat-thread-item ${isActive ? 'active' : ''}`;
                threadEl.onclick = () => {
                    selectedThreadKey = thread.key;
                    renderChatUI();
                };

                const replyBadge = replyCount > 0
                    ? `<span style="background: #25d366; color: white; font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-right: 5px;">${replyCount} رد</span>`
                    : `<span style="background: #aab8c2; color: white; font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-right: 5px;">بدون رد</span>`;

                threadEl.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <span class="thread-student-name">${escapeHTML(thread.studentName)} ${replyBadge}</span>
                        <span style="font-size: 10px; color: #8696a0;">${lastMsgDate}</span>
                    </div>
                    <div class="thread-meta">
                        <span style="color: #8e44ad; font-weight: bold; font-size: 11px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">الإشعار: "${escapeHTML(thread.notificationTitle)}"</span>
                        <span>${escapeHTML(thread.studentClassInfo)}</span>
                    </div>
                    <div class="thread-snippet">${escapeHTML(lastMsgSender)}${escapeHTML(lastMsgText)}</div>
                `;
                chatThreadsList.appendChild(threadEl);
            });

            // Render active thread in viewport
            const activeThread = activeThreads[selectedThreadKey];
            if (!activeThread) {
                chatViewport.innerHTML = `
                    <div class="chat-placeholder">
                        <span class="chat-placeholder-icon">💬</span>
                        <div>اختر محادثة من القائمة لبدء القراءة والرد على الطلاب</div>
                    </div>
                `;
                return;
            }

            activeThread.messages.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

            let messagesHTML = '';
            activeThread.messages.forEach(msg => {
                const isTeacher = msg.sender === 'Teacher';
                const bubbleClass = isTeacher ? 'chat-bubble-teacher' : 'chat-bubble-student';
                
                let dateString = 'الآن';
                if (msg.timestamp) {
                    const date = msg.timestamp.toDate();
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    dateString = `${hours}:${minutes}`;
                }

                // Show "إشعار أصلي" label on the original notification message
                const originalLabel = msg.isOriginal ? '<div style="font-size: 10px; color: #8e44ad; font-weight: bold; margin-bottom: 3px;">📢 الإشعار الأصلي</div>' : '';
                const deleteBtn = `<button onclick="deleteReply('${msg.id}', ${!!msg.isOriginal}, '${activeThread.notificationId}')" class="delete-msg-btn" title="حذف الرسالة">🗑</button>`;

                messagesHTML += `
                    <div class="chat-bubble ${bubbleClass}">
                        ${originalLabel}
                        <div style="font-size: 13px; color: #111b21;">${escapeHTML(msg.message)}</div>
                        <div class="bubble-meta">
                            <span>${dateString}</span>
                            ${deleteBtn}
                        </div>
                    </div>
                `;
            });

            chatViewport.innerHTML = `
                <div class="chat-viewport-header">
                    <span class="chat-header-title">${escapeHTML(activeThread.studentName)} <span style="font-weight: normal; font-size: 12px; color: #667781;">(${escapeHTML(activeThread.studentClassInfo)})</span></span>
                    <span class="chat-header-subtitle">الإشعار: "${escapeHTML(activeThread.notificationTitle)}"</span>
                </div>
                <div class="chat-viewport-body" id="chatViewportBody">
                    ${messagesHTML}
                </div>
                <div class="chat-viewport-footer">
                    <input type="text" id="chatInputField" class="chat-input-field" placeholder="اكتب ردك هنا...">
                    <button id="chatSendBtn" class="chat-send-btn" onclick="sendTeacherReply('${activeThread.studentId}', '${activeThread.studentName.replace(/'/g, "\\'")}', '${activeThread.notificationId}', '${activeThread.notificationTitle.replace(/'/g, "\\'")}')">إرسال</button>
                </div>
            `;

            // Auto scroll to bottom
            const bodyEl = document.getElementById('chatViewportBody');
            if (bodyEl) {
                bodyEl.scrollTop = bodyEl.scrollHeight;
            }

            // Keyboard enter listener
            const inputEl = document.getElementById('chatInputField');
            if (inputEl) {
                inputEl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        document.getElementById('chatSendBtn').click();
                    }
                });
                inputEl.focus();
            }
        }

        async function deleteReply(docId, isOriginal, notificationId) {
            const msg = isOriginal ? 'هل أنت متأكد من حذف الإشعار الأصلي وكل ردوده؟' : 'هل أنت متأكد من حذف هذه الرسالة؟';
            if (!confirm(msg)) return;
            try {
                if (isOriginal) {
                    // Delete original notification
                    await db.collection('notifications').doc(notificationId).delete();
                    // Delete all associated replies
                    const repliesSnapshot = await db.collection('notification_replies')
                        .where('notificationId', '==', notificationId).get();
                    const batch = db.batch();
                    repliesSnapshot.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    // Reset selection if this thread was selected
                    if (selectedThreadKey && selectedThreadKey.startsWith(notificationId + '_')) {
                        selectedThreadKey = null;
                    }
                } else {
                    await db.collection('notification_replies').doc(docId).delete();
                }
            } catch (e) {
                console.error('Error deleting message:', e);
                alert('حدث خطأ أثناء الحذف');
            }
        }

        async function sendTeacherReply(studentId, studentName, notificationId, notificationTitle) {
            const inputEl = document.getElementById('chatInputField');
            const btnEl = document.getElementById('chatSendBtn');
            if (!inputEl) return;
            const message = inputEl.value.trim();
            if (!message) return;

            btnEl.disabled = true;
            btnEl.textContent = "إرسال...";

            try {
                // 1. Add to notification_replies
                await db.collection("notification_replies").add({
                    notificationId: notificationId,
                    notificationTitle: notificationTitle,
                    studentId: studentId,
                    studentName: studentName,
                    studentClassInfo: "",
                    message: message,
                    sender: "Teacher",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. Add to notifications (so student sees it)
                await db.collection("notifications").add({
                    title: "رد من المعلم",
                    body: message,
                    target: studentId,
                    replyToNotificationId: notificationId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    sender: "Teacher"
                });

                inputEl.value = "";
            } catch (err) {
                console.error("Error sending reply:", err);
                alert("حدث خطأ أثناء الإرسال ❌");
            } finally {
                btnEl.disabled = false;
                btnEl.textContent = "إرسال";
            }
        }

        window.sendTeacherReply = sendTeacherReply;
        window.deleteReply = deleteReply;

        // Call loadReplies on init
        document.addEventListener('DOMContentLoaded', loadReplies);
    </script>

</body>
